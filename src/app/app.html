<div style="font-family: sans-serif; padding: 20px; background-color: #1e1e1e; color: white; min-height: 100vh;">
  
  <h1 style="color: #4CAF50;">📊 Motor de Rendimento Passivo</h1>
  <p>Status: Conectado ao servidor Python (FastAPI)</p>

  <div *ngIf="carregando">
    <p>A sincronizar com a B3... Aguarde.</p>
  </div>

  <table *ngIf="!carregando" style="width: 100%; max-width: 600px; text-align: left; border-collapse: collapse; margin-top: 20px;">
    <thead>
      <tr style="border-bottom: 2px solid #4CAF50;">
        <th style="padding: 10px;">Fundo Imobiliário</th>
        <th style="padding: 10px;">Preço Atual</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let ativo of ativos" style="border-bottom: 1px solid #333;">
        <td style="padding: 10px; font-weight: bold;">{{ ativo.fundo }}</td>
        <td style="padding: 10px; color: #4CAF50;">
          R$ {{ ativo.precoAtual | number:'1.2-2' }}
        </td>
      </tr>
    </tbody>
  </table>
  
  <button (click)="buscarCotacoes()" style="margin-top: 20px; padding: 10px 20px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;">
    Atualizar Cotações
  </button>
</div>
